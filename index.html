<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M1 Coast Fi AI Advisor Experience</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif; }
  /* hide scrollbars inside iOS frames */
  .phone-scroll::-webkit-scrollbar { display: none; }
  .phone-scroll { scrollbar-width: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tokens.jsx"></script>
<script type="text/babel" src="chrome.jsx"></script>
<script type="text/babel" src="inputs.jsx"></script>
<script type="text/babel" src="variant-b.jsx"></script>

<script type="text/babel" data-presets="react">
function PhoneFrame({ children }) {
  // 402x874 is the iOS 16 Pro default in the starter; pass children as
  // the screen content. The starter's IOSDevice handles the bezel.
  return (
    <IOSDevice dark={true} width={402} height={874} hideHomeIndicator={false}>
      <div className="phone-scroll" style={{
        width: '100%', height: '100%',
        display: 'flex', flexDirection: 'column',
        paddingTop: 54, /* clear the iOS status bar overlay */
      }}>
        {children}
      </div>
    </IOSDevice>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="coast-fi"
        title="M1 Coast Fi AI Advisor Experience"
      >
        <DCArtboard
          id="projection"
          label="Coast FI Calculator"
          width={402}
          height={874}
        >
          <PhoneFrame>
            <VariantB />
          </PhoneFrame>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
